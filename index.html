<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Paused | Contact Company</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0f172a 0%, #111827 100%);
      font-family: system-ui, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .pause-icon {
      font-size: 5rem;
      background: rgba(255, 255, 255, 0.08);
      width: 100px;
      height: 100px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 200, 100, 0.4);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f0f3fa;
      letter-spacing: -0.3px;
      margin-bottom: 1rem;
    }

    .inactive-message {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem 1.2rem;
      border-radius: 1.5rem;
      font-size: 1rem;
      color: #cddcff;
      margin: 1.5rem 0;
      border-left: 3px solid #ffb347;
      text-align: left;
    }

    .inquiry-section {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin: 1.8rem 0;
    }

    .inquiry-label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #ffdfb0;
      margin-bottom: 0.5rem;
    }

    .inquiry-text {
      font-size: 1rem;
      color: #bdd4ff;
    }

    hr {
      margin: 1.2rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }

    .footer-note {
      font-size: 0.75rem;
      color: #7b8bb0;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.8rem;
      }
      h1 {
        font-size: 1.7rem;
      }
      .pause-icon {
        width: 70px;
        height: 70px;
        font-size: 3.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="pause-icon">⏸️</div>
  <h1>This website is paused</h1>
  <div class="inactive-message">
    The service is currently inactive. No interactive features are available at this time.
  </div>
  <div class="inquiry-section">
    <div class="inquiry-label">📬 FOR ANY INQUIRIES</div>
    <div class="inquiry-text">Please contact the company directly:</div>
  </div>
  <hr>
  <div class="footer-note">
    Thank you for your understanding.
  </div>
</div>
</body>
</html>
